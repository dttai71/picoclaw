<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoClaw Web Channel Test Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
        }
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h1 { color: #4CAF50; margin-bottom: 10px; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.disconnected { background: #f44336; color: white; }
        .status.connected { background: #4CAF50; color: white; }
        .status.connecting { background: #FF9800; color: white; }
        .auth-panel {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .auth-panel input {
            width: 300px;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            margin-right: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover { background: #45a049; }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover { background: #da190b; }
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
        }
        .message.user {
            background: #1976D2;
            margin-left: auto;
            text-align: right;
        }
        .message.agent {
            background: #333;
        }
        .message.system {
            background: #FF9800;
            color: #000;
            text-align: center;
            max-width: 100%;
        }
        .message .meta {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .input-panel {
            display: flex;
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #444;
        }
        .input-panel input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            margin-right: 10px;
        }
        .input-panel input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .stat-card {
            background: #333;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 PicoClaw Web Channel Test</h1>
            <span class="status disconnected" id="status">Disconnected</span>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="msgCount">0</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="latency">-</div>
                    <div class="stat-label">Latency (ms)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uptime">-</div>
                    <div class="stat-label">Uptime</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sessions">-</div>
                    <div class="stat-label">Sessions</div>
                </div>
            </div>
        </div>

        <div class="auth-panel">
            <input type="password" id="tokenInput" placeholder="Enter auth token (test-secret-token-123)" />
            <button class="btn btn-primary" onclick="authenticate()">Authenticate</button>
            <button class="btn btn-danger" onclick="disconnect()" style="margin-left: 10px;">Disconnect</button>
        </div>

        <div class="chat-panel">
            <div class="messages" id="messages"></div>
            <div class="input-panel">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)" />
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let authenticated = false;
        let messageCount = 0;
        let startTime = null;

        function updateStatus(status) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + status;
            statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function addMessage(role, content) {
            const messagesEl = document.getElementById('messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message ' + role;
            
            const metaEl = document.createElement('div');
            metaEl.className = 'meta';
            metaEl.textContent = new Date().toLocaleTimeString();
            
            const contentEl = document.createElement('div');
            contentEl.textContent = content;
            
            msgEl.appendChild(metaEl);
            msgEl.appendChild(contentEl);
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            
            messageCount++;
            document.getElementById('msgCount').textContent = messageCount;
        }

        async function authenticate() {
            const token = document.getElementById('tokenInput').value;
            if (!token) {
                alert('Please enter auth token');
                return;
            }

            try {
                const response = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                if (response.ok) {
                    authenticated = true;
                    addMessage('system', '✓ Authentication successful');
                    connectWebSocket();
                } else {
                    addMessage('system', '✗ Authentication failed');
                }
            } catch (err) {
                addMessage('system', '✗ Error: ' + err.message);
            }
        }

        function connectWebSocket() {
            updateStatus('connecting');
            
            ws = new WebSocket('ws://127.0.0.1:8080/ws');
            startTime = Date.now();

            ws.onopen = () => {
                updateStatus('connected');
                addMessage('system', '✓ WebSocket connected');
                fetchStatus();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'message' && data.text) {
                    addMessage('agent', data.text);
                } else if (data.type === 'error') {
                    addMessage('system', '✗ Error: ' + data.message);
                }
                
                // Calculate latency if timestamp present
                if (data.timestamp) {
                    const latency = Date.now() - data.timestamp;
                    document.getElementById('latency').textContent = latency;
                }
            };

            ws.onerror = (error) => {
                addMessage('system', '✗ WebSocket error');
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                updateStatus('disconnected');
                addMessage('system', '✗ Connection closed');
                ws = null;
                authenticated = false;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('system', '✗ Not connected');
                return;
            }

            const payload = {
                type: 'chat',
                text: text,
                timestamp: Date.now()
            };

            ws.send(JSON.stringify(payload));
            addMessage('user', text);
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.active_sessions !== undefined) {
                    document.getElementById('sessions').textContent = data.active_sessions;
                }
                
                if (data.uptime_seconds) {
                    const hours = Math.floor(data.uptime_seconds / 3600);
                    const minutes = Math.floor((data.uptime_seconds % 3600) / 60);
                    document.getElementById('uptime').textContent = `${hours}h ${minutes}m`;
                }
            } catch (err) {
                console.error('Status fetch error:', err);
            }
        }

        // Auto-refresh status every 5 seconds
        setInterval(() => {
            if (authenticated) fetchStatus();
        }, 5000);
    </script>
</body>
</html>
